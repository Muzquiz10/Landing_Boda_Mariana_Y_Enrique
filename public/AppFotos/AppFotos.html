<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comparte tus fotos y videos 📸</title>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin>
  <link rel="stylesheet" href="style.css?v=20260530-3">
  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico">


</head>

<body>
  <main class="container">
    <h1>Mariana y Enrique</h1>
    <h2>27 de junio de 2026</h2>
    <h3>¡Bienvenid@ a nuestra App de fotos y vídeos!</h3>


    <p class="subtitle">
      Gracias por acompañarnos en este día tan especial ✨
    </p>

    <!-- INPUT REAL -->
    <input
      type="file"
      id="file"
      multiple
      accept="image/*,video/*"
    />

    <!-- BOTÓN BONITO -->
    <label class="upload-box" for="file">
      Selecciona fotos o videos
    </label>

    <!-- PREVIEW -->
    <div id="preview" class="preview"></div>

    <!-- SUBIR -->
    <div class="button-row">
      <button class="btn" type="button" onclick="upload()">
        Subir archivos
      </button>

      <a href="galeria.html" class="btn">
        Galería de la boda
      </a>
    </div>

    <!-- PROGRESO -->
    <div class="progress-wrapper">
      <div id="progress-bar"></div>
    </div>

    <p id="status" class="status"></p>
  </main>

  <script type="module" src="AppFotos.js?v=20260530-3"></script>
</body>
</html>
