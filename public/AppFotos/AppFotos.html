<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comparte tus fotos 📸</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico">


</head>

<body>
  <main class="container">
    <h1>📸 Comparte tus fotos</h1>

    <p class="subtitle">
      Gracias por acompañarnos en este día tan especial ❤️
    </p>

    <!-- INPUT REAL -->
    <input
      type="file"
      id="file"
      multiple
      accept="image/*"
    />

    <!-- BOTÓN BONITO -->
    <label class="upload-box" for="file">
      Selecciona tus fotos
    </label>

    <!-- PREVIEW -->
    <div id="preview" class="preview"></div>

    <!-- SUBIR -->
    <div class="button-row">
      <button class="btn" type="button" onclick="upload()">
        Subir fotos
      </button>

      <a href="galeria.html" class="btn">
        📸 Galería de la boda
      </a>
    </div>

    <!-- PROGRESO -->
    <div class="progress-wrapper">
      <div id="progress-bar"></div>
    </div>

    <p id="status" class="status"></p>
  </main>

  <script type="module" src="AppFotos.js"></script>
</body>
</html>
